name: automerge
on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - synchronize
      - opened
      - edited
      - ready_for_review
      - reopened
      - unlocked
  pull_request_review:
    types:
      - submitted
  check_suite:
    types:
      - completed
  status: {}
  workflow_run:
    workflows: ["Test Beerkellar", "CodeQL"]
    types: ["completed"]
jobs:
  automerge:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: automerge
        uses: "pascalgn/automerge-action@v0.16.4"
        env:
          GITHUB_TOKEN: "${{ secrets.PERSONAL_TOKEN }}"
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: "pull-request-title-and-description"
          MERGE_LABELS: ""
