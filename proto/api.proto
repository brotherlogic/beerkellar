syntax = "proto3";

package beerkellar;

import "beer.proto";

option go_package = "github.com/brotherlogic/beerkellar/proto";


message User {
    string auth = 1;
    string access_token = 2;
    string username = 3;
    int64 user_id = 4;

    int64 latest_checkin = 5;
    int64 last_feed_pull = 6;
}

message Checkin {
  int64 checkin_id = 1;
  int64 beer_id = 2;
  int64 date = 3;
  int32 rating = 4;
}

message LastCheckins {
  string username = 1;
  map<int64, int64> last_checkins = 2;
}

message AddBeerRequest {
  int64 beer_id = 1;
  int32 quantity = 2;
  int32 size_fl_oz = 3;
}

message AddBeerResponse {
}


message GetLoginRequest {}

message GetLoginResponse {
  string url = 1;
  string code = 2;
}

message GetAuthTokenRequest {
  string code = 1;
}

message GetAuthTokenResponse {
  string code = 2;
}

message HealthyRequest {}
message HealthyResponse {}

message GetCellarRequest{}
message GetCellarResponse{
  repeated Beer beers = 1;
}

message GetBeerRequest{
  repeated BeerRequirement requirements = 1;
    bool no_repeat = 2;
}
message GetBeerResponse{
  repeated Beer beers = 1;
}

message BeerRequirement {
  int32 max_units = 1;
  enum PickStrategy {
    STRATEGY_RANDOM = 0;
    STRATEGY_OLDEST = 1;
  }
  PickStrategy strategy = 2;
}

message GetDrunkRequest {}
message GetDrunkResponse {
  map<int64, int64> drunk = 1;
}

service BeerKeller {
  rpc AddBeer(AddBeerRequest) returns (AddBeerResponse) {}

  rpc GetLogin(GetLoginRequest) returns (GetLoginResponse) {}
  rpc GetAuthToken(GetAuthTokenRequest) returns (GetAuthTokenResponse) {}

  rpc GetCellar(GetCellarRequest) returns (GetCellarResponse)  {}
  rpc GetBeer(GetBeerRequest) returns (GetBeerResponse) {}
  rpc GetDrunk(GetDrunkRequest) returns (GetDrunkResponse) {}

  rpc Healthy(HealthyRequest) returns (HealthyResponse) {}
}

message SetRedirectRequest {
  string url = 1;
}

message SetRedirectResponse {
}

message RefreshUserRequest {
  string username = 1;
}
message RefreshUserResponse {}

service BeerKellerAdmin {
  rpc SetRedirect(SetRedirectRequest) returns (SetRedirectResponse) {}
  rpc RefreshUser(RefreshUserRequest) returns (RefreshUserResponse) {}
}