syntax = "proto3";

package beerkellar;

import "beer.proto";

option go_package = "github.com/brotherlogic/beerkellar/proto";


message User {
    string auth = 1;
    string access_token = 2;
    string username = 3;
    int64 user_id = 4;

    int64 latest_checkin = 5;
    int64 last_feed_pull = 6;

    string google_access_token = 8;
    string google_refresh_token = 9;
    bool google_tasks_enabled = 10;
    bool google_task_active = 11;

    enum UserState {
        STATE_UNKNOWN = 0;
        STATE_LOGGING_IN = 1;
        STATE_LOGGED_IN = 2;
        STATE_AUTHORIZED = 3;
    }
    UserState state = 7;
}

message Checkin {
  int64 checkin_id = 1;
  int64 beer_id = 2;
  int64 date = 3;
  int32 rating = 4;
  int32 size_fl_oz = 5;
}

message LastCheckins {
  string username = 1;
  map<int64, int64> last_checkins = 2;
}

message AddBeerRequest {
  int64 beer_id = 1;
  int32 quantity = 2;
  int32 size_fl_oz = 3;
}

message AddBeerResponse {
}


message GetLoginRequest {}

message GetLoginResponse {
  string url = 1;
  string code = 2;
}

message GetAuthTokenRequest {
  string code = 1;
}

message GetAuthTokenResponse {
  string code = 2;
}

message HealthyRequest {}
message HealthyResponse {}

message GetCellarRequest{}
message GetCellarResponse{
  repeated Beer beers = 1;
  string username = 2;
  User.UserState state = 3;
}

message GetBeerRequest{
  repeated BeerRequirement requirements = 1;
    bool no_repeat = 2;
}
message GetBeerResponse{
  repeated Beer beers = 1;
}

message BeerRequirement {
  float max_units = 1;
  enum PickStrategy {
    STRATEGY_RANDOM = 0;
    STRATEGY_OLDEST = 1;
    STRATEGY_LEAST_RECENTLY_DRUNK = 2;
  }
  PickStrategy strategy = 2;
}

message GetDrunkRequest {
  int32 count = 1;
}

message DrunkBeer {
  int64 beer_id = 1;
  string name = 2;
  string brewery = 3;
  float abv = 4;
  int32 size_fl_oz = 5;
  int64 date = 6;
  float units = 7;
}

message GetDrunkResponse {
  repeated DrunkBeer drunk = 1;
}

message DrinkBeerRequest {
  int64 beer_id = 1;
}

message DrinkBeerResponse {}

service BeerKeller {
  rpc AddBeer(AddBeerRequest) returns (AddBeerResponse) {}
  rpc DrinkBeer(DrinkBeerRequest) returns (DrinkBeerResponse) {}

  rpc GetLogin(GetLoginRequest) returns (GetLoginResponse) {}
  rpc GetAuthToken(GetAuthTokenRequest) returns (GetAuthTokenResponse) {}

  rpc GetCellar(GetCellarRequest) returns (GetCellarResponse)  {}
  rpc GetBeer(GetBeerRequest) returns (GetBeerResponse) {}
  rpc GetDrunk(GetDrunkRequest) returns (GetDrunkResponse) {}

  rpc Healthy(HealthyRequest) returns (HealthyResponse) {}
}

message SetRedirectRequest {
  string url = 1;
}

message SetRedirectResponse {
}

message RefreshUserRequest {
  string username = 1;
}
message RefreshUserResponse {}

message GetGoogleLoginRequest {}
message GetGoogleLoginResponse {
  string url = 1;
}

message HandleGoogleAuthRequest {
  string code = 1;
}
message HandleGoogleAuthResponse {}

message ToggleGoogleTasksRequest {
  bool enable = 1;
}
message ToggleGoogleTasksResponse {}

service BeerKellerAdmin {
  rpc SetRedirect(SetRedirectRequest) returns (SetRedirectResponse) {}
  rpc RefreshUser(RefreshUserRequest) returns (RefreshUserResponse) {}
}

service BeerKellerGoogle {
  rpc GetGoogleLogin(GetGoogleLoginRequest) returns (GetGoogleLoginResponse) {}
  rpc HandleGoogleAuth(HandleGoogleAuthRequest) returns (HandleGoogleAuthResponse) {}
  rpc ToggleGoogleTasks(ToggleGoogleTasksRequest) returns (ToggleGoogleTasksResponse) {}
}